name: 楽天ROOM自動投稿

on:
  schedule:
    - cron: '0 15 * * *'   # JST 0時（UTC 15時）
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Chromeをインストール
        uses: browser-actions/setup-chrome@v1

      - name: ChromeDriverをインストール
        uses: nanasess/setup-chromedriver@v2

      - name: 依存パッケージをインストール
        run: npm install

      - name: 楽天ROOMに自動投稿
        env:
          EM:  ${{ secrets.EM }}
          PW:  ${{ secrets.PW }}
          SID: ${{ secrets.SID }}
          GSA: ${{ secrets.GSA }}
        run: node post.js

      - name: スクリーンショットをアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            page_debug.html
            debug_room_login_before.png
            debug_room_login_after.png
            debug4b.png
            page_debug.html
            debug_login_1.png
            debug_login_2.png
            debug_login_3.png
            debug_login_failed.png
            debug_login_error.png
            debug_room_login_1.png
            debug_room_login_2.png
            debug_room_login_3.png
            debug_room_relogin2_1.png
            debug_room_relogin2_2.png
            debug1.png
            debug2.png
            debug3.png
            debug4.png
            debug_final.png
            debug_error.png
            debug_no_bookmark.png
            debug_no_form.png
          if-no-files-found: ignore
