name: 楽天ROOM自動投稿

on:
  schedule:
    # 日本時間 7時・12時・19時・21時・0時（UTC換算）
    - cron: '0 22 * * *'   # JST 7時
    - cron: '0 3 * * *'    # JST 12時
    - cron: '0 10 * * *'   # JST 19時
    - cron: '0 12 * * *'   # JST 21時
    - cron: '0 15 * * *'   # JST 0時
  workflow_dispatch:         # 手動実行も可能

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 依存パッケージをインストール
        run: npm install

      - name: 楽天ROOMに自動投稿
        env:
          RAKUTEN_EMAIL:          ${{ secrets.RAKUTEN_EMAIL }}
          RAKUTEN_PASSWORD:       ${{ secrets.RAKUTEN_PASSWORD }}
          SPREADSHEET_ID:         ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: node post.js
